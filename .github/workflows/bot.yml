name: DIX Probiv Bot 24/7

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install telethon aiohttp cryptg
      - name: Run bot
        run: python3 dix_bot.py
        timeout-minutes: 590
